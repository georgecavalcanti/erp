# Agendamento nativo do Solid Queue (roda no supervisor in-Puma em produção).
# Cron via Fugit; timezone explícito America/Sao_Paulo porque o app roda em UTC.
# Só em `production` — em dev/test nada dispara (não bate no ERP à toa).
production:
  sankhya_sync:
    class: SankhyaSyncJob
    queue: sankhya
    schedule: "*/30 8-19 * * * America/Sao_Paulo" # a cada 30min, 8h–19h (horário comercial)
    description: "Incremental de notas + snapshot de carteira e inadimplência"

  sankhya_reconcile:
    class: SankhyaReconcileJob
    args: [ 90 ]
    queue: sankhya
    schedule: "0 3 * * * America/Sao_Paulo" # 03:00 (madrugada) — remove órfãs da janela de 90d
    description: "Reconcile de notas: remove órfãs deletadas/estornadas no ERP"

  sankhya_catalog:
    class: SankhyaCatalogSyncJob
    queue: sankhya
    schedule: "15 8-19/2 * * * America/Sao_Paulo" # a cada 2h (8h15-18h15) — cadastros mudam devagar (FV360 doc 03)
    description: "Cadastros: produtos, parceiros e vendedores (full upsert)"

  sankhya_stock:
    class: SankhyaStockSyncJob
    queue: sankhya
    schedule: "*/30 8-19 * * * America/Sao_Paulo" # a cada 30min, horário comercial (estado, muda rápido)
    description: "Snapshot de estoque por produto (TGFEST)"

  projection_recalc:
    class: ProjectionRecalcJob
    queue: default
    schedule: "10 0 * * * America/Sao_Paulo" # 00:10 — virada de dia (atualiza dias úteis/ritmo)
    description: "Recalcula projeções do mês por vendedor com meta (append-only)"

  repurchase_forecast:
    class: RepurchaseForecastJob
    queue: default
    schedule: "30 2 * * * America/Sao_Paulo" # 02:30 (madrugada) — recompra do dia, com o histórico já sincronizado
    description: "Previsão de recompra por parceiro: concilia abertas + grava novas (append-only)"
