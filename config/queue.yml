# Config do Solid Queue (dispatcher + workers). Jobs são poucos e pesados (batem
# na API do Sankhya), então poucos threads pra não paralelizar chamadas ao ERP.
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 2
      processes: 1
      polling_interval: 1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
