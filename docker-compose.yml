services:
  db:
    image: postgres:17
    container_name: faturamento_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: faturamento
      POSTGRES_PASSWORD: faturamento_dev_password
      POSTGRES_DB: faturamento_development
    ports:
      # Host 5433 -> container 5432 (5432 is used by another project's Postgres)
      - "5433:5432"
    volumes:
      - faturamento_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faturamento"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  faturamento_pgdata:
